name: Reviews Agent — aggiornamento recensioni Google

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULING
# ─────────────────────────────────────────────────────────────────────────────
# Le recensioni Google non cambiano spesso: un aggiornamento al giorno è
# più che sufficiente e resta comodamente dentro il limite di 30 giorni
# di cache imposto dalle condizioni d'uso di Google Places API.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '30 5 * * *'   # 07:30 IT (CEST) / 06:30 IT (CET) circa — una volta al giorno

  workflow_dispatch: {}

jobs:
  update-reviews:
    name: Aggiorna reviews.json
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run reviews agent
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
        run: python reviews_agent.py
