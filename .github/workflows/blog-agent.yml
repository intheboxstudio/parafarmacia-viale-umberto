name: Blog Agent — daily post

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULING
# ─────────────────────────────────────────────────────────────────────────────
# Pubblichiamo SOLO martedì (2), giovedì (4) e sabato (6).
#
# L'Italia oscilla tra due fusi orari:
#   - CEST (estate, UTC+2) → 10:00 IT = 08:00 UTC
#   - CET  (inverno, UTC+1) → 10:00 IT = 09:00 UTC
#
# Schedulando entrambi i cron, copriamo automaticamente il cambio d'ora
# legale/solare. Lo script Python ha un anti-doppione idempotente
# (legge articles.json e abortisce se ha già pubblicato oggi), quindi
# il run "sbagliato" del giorno termina senza fare danni.
#
# NOTA SUL DRIFT: GitHub Actions cron NON è preciso al minuto — può ritardare
# anche di 30-60 min sotto carico. Per questo il check Python NON guarda
# l'ora corrente ma controlla solo "ho già pubblicato oggi?".
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 8 * * 2,4,6'   # 10:00 IT (CEST) — mar/gio/sab
    - cron: '0 9 * * 2,4,6'   # 10:00 IT (CET)  — mar/gio/sab

  workflow_dispatch:
    inputs:
      force_run:
        description: 'Esegui anche se non è un giorno di pubblicazione (test)'
        required: false
        type: boolean
        default: true

jobs:
  publish:
    name: Genera e pubblica articolo
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run blog agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || 'false' }}
        run: python blog_agent.py
