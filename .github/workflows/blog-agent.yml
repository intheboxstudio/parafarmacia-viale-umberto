name: Blog Agent — daily post

# L'Italia usa due fusi orari nel corso dell'anno:
#   - CET  (inverno, UTC+1) → 10:00 IT = 09:00 UTC
#   - CEST (estate,  UTC+2) → 10:00 IT = 08:00 UTC
#
# Schedulando entrambi i cron, lo script Python verifica internamente
# che siano davvero le 10:00 italiane e abortisce silenziosamente
# l'esecuzione "sbagliata" del giorno. Niente drift due volte l'anno.

on:
  schedule:
    - cron: '0 8 * * *'   # 10:00 IT durante l'ora legale (CEST)
    - cron: '0 9 * * *'   # 10:00 IT durante l'ora solare (CET)

  workflow_dispatch:
    inputs:
      force_run:
        description: 'Esegui anche se non sono le 10:00 italiane (per test)'
        required: false
        type: boolean
        default: true

jobs:
  publish:
    name: Genera e pubblica articolo
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run blog agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || 'false' }}
        run: python blog_agent.py
